name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-poistenieskla
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HETZNER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "poistenieskla.html,login.html"
          target: /opt/poistenieskla/
          strip_components: 0
