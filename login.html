<html lang="sk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Prihlásenie — Poistenie skla</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
button{font-family:inherit;cursor:pointer;}
input{font-family:inherit;}
:root{
  --teal-dark:#13616b;--teal-mid:#1a8a96;--teal-accent:#3bc4d4;
  --teal-tint:#f0fafb;--teal-ring:rgba(59,196,212,.18);
  --ink:#111827;--ink-2:#374151;--ink-3:#6b7280;--ink-4:#9ca3af;
  --bg:#eef2f3;--surface:#ffffff;--border:#e2e6ea;--border-strong:#cdd2d8;
  --radius-sm:5px;--radius:8px;--radius-lg:12px;
  --danger:#ef4444;
}
body{
  background:var(--bg);color:var(--ink);
  font-family:'Inter',-apple-system,sans-serif;font-size:13px;line-height:1.4;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px 20px;-webkit-font-smoothing:antialiased;
}

.login-wrap{width:100%;max-width:400px;}

/* LOGO */
.logo-block{text-align:center;margin-bottom:32px;}

/* CARD */
.card{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.07);overflow:hidden;}
.card-accent{height:2px;background:linear-gradient(90deg,var(--teal-dark),var(--teal-accent));}
.card-body{padding:28px 32px 32px;}

/* FIELD */
.field{margin-bottom:16px;}
.field label{display:block;font-size:12px;font-weight:600;letter-spacing:.45px;text-transform:uppercase;color:var(--teal-dark);margin-bottom:5px;}
.field input{width:100%;height:42px;border:1px solid var(--border-strong);border-radius:var(--radius-sm);padding:0 12px;font-size:16px;color:var(--ink);background:var(--surface);transition:border-color .12s,box-shadow .12s;outline:none;}
.field input:focus{border-color:var(--teal-accent);box-shadow:0 0 0 2px var(--teal-ring);}
.field input::placeholder{color:var(--ink-4);}
.field input.error{border-color:var(--danger);}

/* ERROR */
.error-msg{background:#fef2f2;border:1px solid #fecaca;color:var(--danger);border-radius:var(--radius-sm);padding:10px 12px;font-size:13px;margin-bottom:16px;display:none;}

/* CTA */
.cta{width:100%;height:44px;background:var(--teal-dark);color:#fff;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:600;cursor:pointer;transition:background .15s;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px;}
.cta:hover{background:var(--teal-mid);}
.cta:disabled{opacity:.6;cursor:not-allowed;}

/* SPINNER */
.spinner{width:15px;height:15px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ZABUDNUTE HESLO */
.forgot{text-align:center;margin-top:16px;font-size:13px;color:var(--ink-4);}
.forgot a{color:var(--teal-dark);text-decoration:none;}
.forgot a:hover{color:var(--teal-accent);}

/* FOOTER */
.page-footer{margin-top:24px;font-size:13px;color:var(--ink-4);text-align:center;}
</style>
</head>

  <!-- KARTA -->
  <div class="card">
    <div class="card-accent"></div>
    <div class="card-body">

      <div class="error-msg" id="errMsg"></div>

      <form id="loginForm" autocomplete="on">
        <div class="field">
          <label for="login">Prihlasovacie meno</label>
          <input type="text" id="login" name="username" autocomplete="username" placeholder="jan.novak" required>
        </div>

        <div class="field">
          <label for="password">Heslo</label>
          <input type="password" id="password" name="password" autocomplete="current-password" placeholder="••••••••" required>
        </div>

        <button class="cta" type="submit" id="btnLogin">Prihlásiť sa</button>
      </form>

      <div class="forgot">
        <a href="#">Zabudli ste heslo?</a>
      </div>

    </div>
  </div>

  <div class="page-footer">© 2026 Poistenie skla</div>

</div>

<script>
  const API = 'https://api.pripoisti.sk';

  (function checkExistingSession() {
    const raw = localStorage.getItem('ps_token');
    if (!raw) return;
    try {
      const payload = JSON.parse(atob(raw.split('.')[1]));
      if (payload.exp * 1000 > Date.now()) {
        window.location.replace('poistenieskla.html');
      }
    } catch (_) {}
  })();

  const form     = document.getElementById('loginForm');
  const btnLogin = document.getElementById('btnLogin');
  const errMsg   = document.getElementById('errMsg');
  const loginIn  = document.getElementById('login');
  const passIn   = document.getElementById('password');

  function showError(msg) {
    errMsg.textContent = msg;
    errMsg.style.display = 'block';
    loginIn.classList.add('error');
    passIn.classList.add('error');
  }

  function clearError() {
    errMsg.style.display = 'none';
    loginIn.classList.remove('error');
    passIn.classList.remove('error');
  }

  function setLoading(on) {
    if (on) {
      btnLogin.disabled = true;
      btnLogin.innerHTML = '<span class="spinner"></span> Prihlasujem…';
    } else {
      btnLogin.disabled = false;
      btnLogin.textContent = 'Prihlásiť sa';
    }
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    clearError();
    setLoading(true);
    try {
      const resp = await fetch(`${API}/bcrm/auth`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ login: loginIn.value.trim(), password: passIn.value }),
      });
      if (!resp.ok) { showError('Nesprávne meno alebo heslo.'); return; }
      const data = await resp.json();
      localStorage.setItem('ps_token',   data.token);
      localStorage.setItem('ps_meno',    data.meno    || '');
      localStorage.setItem('ps_rola',    data.rola    || '');
      localStorage.setItem('ps_pobocka', data.pobocka || '');
      if (data.logo)  localStorage.setItem('ps_logo', data.logo);
      else            localStorage.removeItem('ps_logo');
      if (data.farba) localStorage.setItem('ps_farba', data.farba);
      else            localStorage.removeItem('ps_farba');
      if (data.firma) localStorage.setItem('ps_firma', data.firma);
      else            localStorage.removeItem('ps_firma');
      window.location.replace('poistenieskla.html');
    } catch (err) {
      showError('Chyba pripojenia. Skontrolujte internet a skúste znova.');
    } finally {
      setLoading(false);
    }
  });
</script>
