<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poistenie skla – Pillow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  /* ─── CONFIG-DRIVEN ACCENT ─────────────────────────────── */
  :root {
    --accent:        #2563EB;
    --accent-light:  #EFF6FF;
    --accent-mid:    #BFDBFE;
    --hero-bg:       #0F172A;
    --hero-text:     #F8FAFC;
    --surface:       #FFFFFF;
    --surface-2:     #F8FAFC;
    --border:        #E2E8F0;
    --text:          #0F172A;
    --text-muted:    #64748B;
    --danger:        #EF4444;
    --success:       #10B981;
    --radius:        14px;
    --radius-sm:     8px;
    --shadow:        0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
    --shadow-lg:     0 8px 32px rgba(0,0,0,.12);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--surface-2);
    color: var(--text);
    min-height: 100vh;
  }

  /* ─── HEADER ──────────────────────────────────────────── */
  header {
    background: var(--hero-bg);
    padding: 0 24px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    font-family: 'Instrument Serif', serif;
    font-size: 22px;
    color: #fff;
    letter-spacing: -.3px;
  }
  .logo span { color: var(--accent); }

  /* ─── STEPPER ─────────────────────────────────────────── */
  .stepper {
    background: var(--hero-bg);
    padding: 0 24px 20px;
    display: flex;
    gap: 0;
    max-width: 680px;
    margin: 0 auto;
  }
  .step {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    position: relative;
  }
  .step::before {
    content: '';
    position: absolute;
    top: 14px;
    left: 50%;
    width: 100%;
    height: 2px;
    background: rgba(255,255,255,.15);
  }
  .step:last-child::before { display: none; }
  .step-circle {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: rgba(255,255,255,.12);
    border: 2px solid rgba(255,255,255,.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 600;
    color: rgba(255,255,255,.5);
    position: relative;
    z-index: 1;
    transition: all .3s;
  }
  .step.active .step-circle {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    box-shadow: 0 0 0 4px rgba(37,99,235,.3);
  }
  .step.done .step-circle {
    background: var(--success);
    border-color: var(--success);
    color: #fff;
  }
  .step.done::before { background: var(--success); }
  .step.active::before { background: rgba(255,255,255,.15); }
  .step-label {
    font-size: 10px;
    font-weight: 500;
    color: rgba(255,255,255,.35);
    text-align: center;
    letter-spacing: .3px;
    text-transform: uppercase;
  }
  .step.active .step-label { color: rgba(255,255,255,.9); }
  .step.done .step-label { color: rgba(255,255,255,.6); }

  /* ─── MAIN LAYOUT ─────────────────────────────────────── */
  main {
    max-width: 760px;
    margin: 32px auto;
    padding: 0 16px 80px;
  }

  /* ─── CARDS ───────────────────────────────────────────── */
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    padding: 32px;
    margin-bottom: 20px;
  }
  .card-title {
    font-family: 'Instrument Serif', serif;
    font-size: 26px;
    color: var(--text);
    margin-bottom: 6px;
  }
  .card-sub {
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 28px;
    line-height: 1.5;
  }

  /* ─── FORM ────────────────────────────────────────────── */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  .form-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
  .form-grid.cols-1 { grid-template-columns: 1fr; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field.span2 { grid-column: span 2; }
  .field.span3 { grid-column: span 3; }
  label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  input, select {
    height: 44px;
    padding: 0 14px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--text);
    background: var(--surface);
    transition: border-color .2s, box-shadow .2s;
    outline: none;
    width: 100%;
  }
  input:focus, select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(37,99,235,.1);
  }
  input.error { border-color: var(--danger); }

  /* ─── STEP 1 SPECIAL ──────────────────────────────────── */
  .ecv-row {
    display: flex;
    gap: 12px;
    align-items: flex-end;
  }
  .ecv-row input { font-size: 18px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; }
  .ecv-lookup-btn {
    height: 44px;
    padding: 0 20px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: background .2s, transform .1s;
    flex-shrink: 0;
  }
  .ecv-lookup-btn:hover { background: #1d4ed8; }
  .ecv-lookup-btn:active { transform: scale(.97); }

  .vehicle-info {
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 16px;
    font-size: 14px;
    font-weight: 500;
    display: none;
  }
  .vehicle-info.visible { display: flex; }
  .vehicle-info.found {
    background: var(--accent-light);
    border: 1.5px solid var(--accent-mid);
    color: var(--accent);
  }
  .vehicle-info.not-found {
    background: #fffbeb;
    border: 1.5px solid #fde68a;
    color: #92400e;
  }
  .vehicle-info.loading {
    background: var(--surface-2);
    border: 1.5px solid var(--border);
    color: var(--text-muted);
  }
  .vehicle-info svg { flex-shrink: 0; }

  /* ─── STEP 2 — HERO INSURANCE ─────────────────────────── */
  .hero-insurance {
    background: linear-gradient(135deg, var(--hero-bg) 0%, #1e3a8a 100%);
    border-radius: var(--radius);
    padding: 28px;
    color: #fff;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: transform .2s;
    margin-bottom: 20px;
    border: 2px solid transparent;
  }
  .hero-insurance::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 160px; height: 160px;
    background: rgba(37,99,235,.25);
    border-radius: 50%;
  }
  .hero-insurance::after {
    content: '';
    position: absolute;
    bottom: -60px; left: 30%;
    width: 220px; height: 220px;
    background: rgba(255,255,255,.03);
    border-radius: 50%;
  }
  .hero-insurance.selected {
    border-color: #60a5fa;
    box-shadow: 0 0 0 3px rgba(96,165,250,.2), var(--shadow-lg);
  }
  .hero-insurance:hover { transform: translateY(-2px); }
  .hero-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,.12);
    border: 1px solid rgba(255,255,255,.2);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .6px;
    margin-bottom: 12px;
    color: #93c5fd;
  }
  .hero-name {
    font-family: 'Instrument Serif', serif;
    font-size: 32px;
    margin-bottom: 8px;
    position: relative;
    z-index: 1;
  }
  .hero-desc {
    font-size: 14px;
    color: rgba(255,255,255,.7);
    line-height: 1.6;
    max-width: 480px;
    margin-bottom: 20px;
    position: relative;
    z-index: 1;
  }
  .hero-price-row {
    display: flex;
    align-items: flex-end;
    gap: 16px;
    position: relative;
    z-index: 1;
  }
  .hero-price {
    font-size: 36px;
    font-weight: 300;
    letter-spacing: -1px;
  }
  .hero-price strong { font-weight: 700; }
  .hero-price-period {
    font-size: 13px;
    color: rgba(255,255,255,.5);
    margin-bottom: 6px;
  }
  .hero-check {
    margin-left: auto;
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,.3);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .2s;
    background: rgba(255,255,255,.08);
  }
  .hero-insurance.selected .hero-check {
    background: var(--success);
    border-color: var(--success);
  }
  .hero-features {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 16px;
    position: relative;
    z-index: 1;
  }
  .hero-feature {
    background: rgba(255,255,255,.1);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 12px;
    color: rgba(255,255,255,.8);
  }

  /* ─── ADD-ONS GRID ────────────────────────────────────── */
  .addons-title {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .6px;
    color: var(--text-muted);
    margin-bottom: 12px;
  }
  .addons-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  @media (max-width: 600px) {
    .addons-grid { grid-template-columns: repeat(2, 1fr); }
    .form-grid, .form-grid.cols-3 { grid-template-columns: 1fr; }
    .field.span2, .field.span3 { grid-column: span 1; }
  }
  .addon-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px;
    cursor: pointer;
    transition: all .2s;
    position: relative;
    overflow: hidden;
  }
  .addon-card:hover {
    border-color: var(--accent-mid);
    background: var(--accent-light);
    transform: translateY(-1px);
  }
  .addon-card.selected {
    border-color: var(--accent);
    background: var(--accent-light);
    box-shadow: 0 0 0 2px rgba(37,99,235,.1);
  }
  .addon-card.loading {
    opacity: .5;
    pointer-events: none;
  }
  .addon-icon { font-size: 20px; margin-bottom: 6px; display: block; }
  .addon-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
    line-height: 1.3;
  }
  .addon-price {
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
  }
  .addon-check {
    position: absolute;
    top: 8px; right: 8px;
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .2s;
  }
  .addon-card.selected .addon-check {
    background: var(--accent);
    border-color: var(--accent);
  }
  .addon-card.selected .addon-check::after {
    content: '';
    width: 6px; height: 4px;
    border-left: 2px solid #fff;
    border-bottom: 2px solid #fff;
    transform: rotate(-45deg) translateY(-1px);
    display: block;
  }

  /* ─── PRICE SUMMARY BAR ───────────────────────────────── */
  .price-bar {
    position: sticky;
    bottom: 0;
    background: var(--hero-bg);
    border-top: 1px solid rgba(255,255,255,.1);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 100;
  }
  .price-bar-label {
    font-size: 12px;
    color: rgba(255,255,255,.5);
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  .price-bar-total {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -.5px;
  }
  .price-bar-total span {
    font-size: 13px;
    font-weight: 400;
    color: rgba(255,255,255,.5);
    margin-left: 4px;
  }
  .price-bar-count {
    font-size: 12px;
    color: rgba(255,255,255,.4);
  }

  /* ─── BUTTONS ─────────────────────────────────────────── */
  .btn-primary {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    padding: 0 28px;
    height: 48px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background .2s, transform .1s, box-shadow .2s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
  }
  .btn-primary:hover { background: #1d4ed8; box-shadow: 0 4px 16px rgba(37,99,235,.35); }
  .btn-primary:active { transform: scale(.97); }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; box-shadow: none; }
  .btn-secondary {
    background: transparent;
    color: var(--text-muted);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0 20px;
    height: 48px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all .2s;
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-row {
    display: flex;
    gap: 12px;
    justify-content: flex-end;
    margin-top: 28px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }

  /* ─── SUMMARY ─────────────────────────────────────────── */
  .summary-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
  }
  .summary-item:last-child { border-bottom: none; }
  .summary-item-name { font-size: 15px; font-weight: 500; }
  .summary-item-name small {
    display: block;
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 400;
    margin-top: 2px;
  }
  .summary-item-price {
    font-size: 16px;
    font-weight: 700;
    color: var(--accent);
    white-space: nowrap;
  }
  .summary-total {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--accent-light);
    border: 1.5px solid var(--accent-mid);
    border-radius: var(--radius-sm);
    padding: 16px 20px;
    margin-top: 16px;
  }
  .summary-total-label {
    font-size: 14px;
    font-weight: 600;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: .4px;
  }
  .summary-total-price {
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -1px;
  }
  .summary-total-price span {
    font-size: 14px;
    font-weight: 400;
    color: var(--text-muted);
    margin-left: 4px;
  }

  /* ─── INFO BOX ────────────────────────────────────────── */
  .info-box {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 16px;
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
  }
  .info-box-icon { font-size: 20px; flex-shrink: 0; }
  .info-box p { font-size: 13px; color: var(--text-muted); line-height: 1.5; }
  .info-box p strong { color: var(--text); }

  /* ─── SUCCESS ─────────────────────────────────────────── */
  .success-screen {
    text-align: center;
    padding: 48px 24px;
  }
  .success-icon {
    width: 72px; height: 72px;
    background: #dcfce7;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    font-size: 32px;
  }
  .success-title {
    font-family: 'Instrument Serif', serif;
    font-size: 30px;
    margin-bottom: 8px;
  }
  .success-sub {
    color: var(--text-muted);
    font-size: 15px;
    line-height: 1.6;
  }

  /* ─── SPINNER ─────────────────────────────────────────── */
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid rgba(255,255,255,.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ─── SECTION HEADER ──────────────────────────────────── */
  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }
  .section-badge {
    background: var(--accent);
    color: #fff;
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .5px;
  }

  /* ─── DIVIDER ─────────────────────────────────────────── */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 24px 0;
  }

  /* ─── TOGGLE (Áno / Nie) ──────────────────────────────── */
  .toggle-group {
    display: flex;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
    height: 44px;
  }
  .toggle-group button {
    flex: 1;
    border: none;
    background: var(--surface);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    transition: background .15s, color .15s;
  }
  .toggle-group button:first-child {
    border-right: 1.5px solid var(--border);
  }
  .toggle-group button.active-yes {
    background: #dcfce7;
    color: #15803d;
    font-weight: 600;
  }
  .toggle-group button.active-no {
    background: #fee2e2;
    color: #b91c1c;
    font-weight: 600;
  }

  /* ─── CHECKBOXES ──────────────────────────────────────── */
  .checkbox-group {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .checkbox-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 14px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-muted);
    background: var(--surface);
    transition: all .15s;
    user-select: none;
  }
  .checkbox-pill input { display: none; }
  .checkbox-pill.checked {
    border-color: var(--accent);
    background: var(--accent-light);
    color: var(--accent);
  }
  .checkbox-pill .pill-check {
    width: 16px; height: 16px;
    border-radius: 4px;
    border: 2px solid var(--border);
    background: #fff;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all .15s;
  }
  .checkbox-pill.checked .pill-check {
    background: var(--accent);
    border-color: var(--accent);
  }
  .checkbox-pill.checked .pill-check::after {
    content: '';
    width: 5px; height: 3px;
    border-left: 2px solid #fff;
    border-bottom: 2px solid #fff;
    transform: rotate(-45deg) translateY(-1px);
    display: block;
  }

  /* ─── VEHICLE DETAIL ROW ──────────────────────────────── */
  .vehicle-detail-row {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .vehicle-detail-item {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    flex: 1;
    min-width: 100px;
  }
  .vehicle-detail-item label {
    display: block;
    margin-bottom: 3px;
    font-size: 10px;
  }
  .vehicle-detail-item span {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }

  /* ─── MODAL ───────────────────────────────────────────── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(15,23,42,.5);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 500;
    animation: fadeIn .2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow-lg);
    padding: 32px;
    width: 100%;
    max-width: 460px;
    margin: 16px;
    animation: slideUp .25s ease;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .modal-title {
    font-family: 'Instrument Serif', serif;
    font-size: 22px;
    margin-bottom: 6px;
  }
  .modal-sub {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 20px;
  }
  .modal-vehicle-grid {
    display: grid;

  /* ─── SEGMENTED CONTROL (typ poistníka) ──────────────── */
  .segment-control {
    display: flex;
    background: var(--surface-2);

    border-radius: var(--radius-sm);

  /* animations */
  .step-screen { animation: fadeUp .35s ease both; }

  .expandable {
    overflow: hidden;

    opacity: 0;

/* ════════════════════════════════════════════════════════
   UTILITIES
════════════════════════════════════════════════════════ */
function fmt(num) {
  return num.toFixed(2).replace('.', ',') + ' €';
}

function totalPrice() {
  let t = 0;
  state.selected.forEach(id => { t += (state.apiPrices[id]?.price || 0); });
  return t;
}

function updateStepper() {
  document.querySelectorAll('.step').forEach(el => {
    const s = +el.dataset.step;
    el.classList.remove('active','done');
    if (s === state.step) el.classList.add('active');
    if (s < state.step)  el.classList.add('done');
    const circle = el.querySelector('.step-circle');
    circle.textContent = s < state.step ? '✓' : s;
  });
}

function updatePriceBar() {
  const bar = document.getElementById('priceBar');
  if (state.step !== 2) { bar.style.display = 'none'; return; }
  bar.style.display = 'flex';
  const total = totalPrice();
  const count = state.selected.size;
  document.getElementById('priceBarTotal').innerHTML =
    `${fmt(total)}<span>/ mes.</span>`;
  document.getElementById('priceBarCount').textContent =
    count === 0 ? 'Žiadne poistenie nevybrané' :
    count === 1 ? '1 poistenie vybrané' : `${count} poistenia vybrané`;
}

/* ════════════════════════════════════════════════════════
   RENDER STEPS
════════════════════════════════════════════════════════ */
function render() {
  updateStepper();
  updatePriceBar();
  const main = document.getElementById('main');

  if (state.step === 2) main.innerHTML = renderStep2();
  if (state.step === 3) main.innerHTML = renderStep3();
  if (state.step === 4) main.innerHTML = renderStep4();
  attachListeners();
}

}

            ${loading ? '<div class="spinner" style="border-color:rgba(255,255,255,.3);border-top-color:#fff;width:28px;height:28px;"></div>' : `<strong>${fmt(heroPrice)}</strong>`}

          <div class="hero-price-period">za mesiac</div>
        </div>
        <div class="hero-check">
          ${heroSelected ? '<svg width="18" height="18" fill="none" stroke="#fff" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>' : ''}
        </div>

      </div>
    </div>`;

  const addonsHtml = addons.map(p => {
    const price = prices[p.id]?.price;
    const sel = state.selected.has(p.id);
    return `
      <div class="addon-card ${sel ? 'selected' : ''} ${loading ? 'loading' : ''}" data-id="${p.id}">
        <div class="addon-check"></div>
        <span class="addon-icon">${p.icon}</span>
        <div class="addon-name">${p.name}</div>
        <div class="addon-price">${loading ? '...' : fmt(price)}<span style="font-size:11px;font-weight:400;color:var(--text-muted);">/mes.</span></div>
      </div>`;
  }).join('');

  return `
  <div class="step-screen">
    <div class="card">
      <div class="section-header">
        <div class="card-title" style="margin-bottom:0;">Vyberte poistenia</div>
        <div class="section-badge">Ceny od poisťovne</div>
      </div>

      <div class="vehicle-detail-row">
        <div class="vehicle-detail-item"><label>EČV</label><span>${state.vehicle.ecv || '–'}</span></div>
        <div class="vehicle-detail-item"><label>Rok výroby</label><span>${state.vehicle.rok || '–'}</span></div>
        <div class="vehicle-detail-item"><label>Výkon</label><span>${state.vehicle.vykon ? state.vehicle.vykon + ' kW' : '–'}</span></div>
        <div class="vehicle-detail-item"><label>Objem</label><span>${state.vehicle.objem ? state.vehicle.objem + ' ccm' : '–'}</span></div>
      </div>

      ${heroHtml}

      <div class="addons-title">Doplnkové poistenia</div>
      <div class="addons-grid">${addonsHtml}</div>

      <div class="btn-row">
        <button class="btn-secondary" id="btnStep2Back">← Späť</button>
        <button class="btn-primary" id="btnStep2Next" ${state.selected.size === 0 ? 'disabled' : ''}>
          Pokračovať &nbsp;→
        </button>
      </div>
    </div>
  </div>`;
}

/* ════════════════════════════════════════════════════════
   EVENT LISTENERS
════════════════════════════════════════════════════════ */
function attachListeners() {
  // STEP 1 — Expand + Lookup + Modal
  const vehicleDetails = document.getElementById('vehicleDetails');
  const vehicleInfo    = document.getElementById('vehicleInfo');
  const btnReset       = document.getElementById('btnResetVehicle');

  function showVehicleInfo(type, text) {
    const icons = { loading: '⏳', found: '✅', 'not-found': '⚠️' };
    vehicleInfo.className = `vehicle-info visible ${type}`;
    document.getElementById('vehicleInfoText').textContent = `${icons[type]} ${text}`;
  }

  function fillVehicleFields(d) {
    if (d.znacka)   document.getElementById('fZnacka').value   = d.znacka;
    if (d.model)    document.getElementById('fModel').value    = d.model;
    if (d.datumReg) document.getElementById('fDatumReg').value = d.datumReg;
    if (d.typ)      document.getElementById('fTyp').value      = d.typ;
    if (d.palivo)   document.getElementById('fPalivo').value   = d.palivo;
    if (d.vykon)    document.getElementById('fVykon').value    = d.vykon;
    if (d.objem)    document.getElementById('fObjem').value    = d.objem;
    if (d.hmotnost) document.getElementById('fHmotnost').value = d.hmotnost;
  }

  function clearVehicleFields() {
    ['fZnacka','fModel','fDatumReg','fVykon','fObjem','fHmotnost'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = '';
    });
    const fTyp = document.getElementById('fTyp');
    if (fTyp) fTyp.value = 'osobne';
    const fPalivo = document.getElementById('fPalivo');
    if (fPalivo) fPalivo.value = 'benzin';
  }

  function showModal(data) {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.id = 'vehicleModal';

    const items = [
      { label: 'Značka',      val: data.znacka },
      { label: 'Model',       val: data.model },
      { label: 'Rok reg.',    val: data.datumReg?.slice(0,4) },
      { label: 'Palivo',      val: data.palivo },
      { label: 'Výkon',       val: data.vykon ? data.vykon + ' kW' : '–' },
      { label: 'Objem',       val: data.objem ? data.objem + ' cm³' : '–' },
      { label: 'Hmotnosť',    val: data.hmotnost ? data.hmotnost + ' kg' : '–' },
      { label: 'Typ',         val: data.typ },
    ].map(i => `
      <div class="modal-vehicle-item">
        <label>${i.label}</label>
        <span>${i.val || '–'}</span>
      </div>`).join('');

    overlay.innerHTML = `
      <div class="modal">
        <div class="modal-title">Je to vaše vozidlo?</div>
        <div class="modal-sub">Skontrolujte údaje. Ak niečo nesedí, môžete ich po potvrdení upraviť.</div>
        <div class="modal-vehicle-grid">${items}</div>
        <div class="modal-btn-row">
          <button class="btn-secondary" id="modalBtnOther">Vypísať iné</button>
          <button class="btn-primary"   id="modalBtnConfirm">✓ Potvrdiť</button>
        </div>
      </div>`;

    document.body.appendChild(overlay);

    document.getElementById('modalBtnConfirm').addEventListener('click', () => {
      vehicleDetails.classList.add('open');
      fillVehicleFields(data);
      showVehicleInfo('found', `${data.znacka} ${data.model} (${data.datumReg?.slice(0,4)}) · ${data.vykon} kW · ${data.objem} cm³`);
      btnReset.classList.add('visible');
      overlay.remove();
    });

    document.getElementById('modalBtnOther').addEventListener('click', () => {
      vehicleDetails.classList.add('open');
      clearVehicleFields();
      showVehicleInfo('not-found', 'Vyplňte údaje vozidla ručne.');
      btnReset.classList.add('visible');
      overlay.remove();
    });
  }

  async function triggerLookup(ecv, vin) {
    if (state.lookupDone) return;
    state.lookupDone = true;
    showVehicleInfo('loading', 'Vyhľadávam vozidlo...');

    const result = await apiLookupVehicle({ ecv, vin });

    if (result.found) {
      showModal(result.data);
    } else {
      vehicleDetails.classList.add('open');
      showVehicleInfo('not-found', 'Vozidlo sa nenašlo v databáze. Vyplňte údaje ručne.');
      btnReset.classList.add('visible');
    }
  }

  // Reset vozidla
  function syncPoistnikFromDOM() {
    const p = state.poistnik;
    p.rodneCislo  = document.getElementById('pRodneCislo')?.value  ?? p.rodneCislo;
    p.datumNar    = document.getElementById('pDatumNar')?.value    ?? p.datumNar;
    p.meno        = document.getElementById('pMeno')?.value        ?? p.meno;
    p.priezvisko  = document.getElementById('pPriezvisko')?.value  ?? p.priezvisko;
    p.ico         = document.getElementById('pIco')?.value         ?? p.ico;
    p.obec        = document.getElementById('pObec')?.value        ?? p.obec;
    p.psc         = document.getElementById('pPsc')?.value         ?? p.psc;
  }

  function resetVehicle() {
    syncPoistnikFromDOM();
    state.vehicle.ecv = '';
    state.vehicle.vin = '';
    state.lookupDone = false;
    state.vehicle.novePredReg = null;
    state.vehicle.maEcv = null;
    state.vehicle.garazovane = null;
    state.vehicle.zmluvnyServis = null;
    state.vehicle.x4 = false;
    state.vehicle.automat = false;
    state.vehicle.parkovaci = false;
    state.vehicle.znacka = '';
    state.vehicle.model = '';
    state.vehicle.datumReg = '';
    state.vehicle.palivo = 'benzin';
    state.vehicle.vykon = '';
    state.vehicle.objem = '';
    state.vehicle.hmotnost = '';
    render();
  }

  function resetAll() {
    state.vehicle = {
      ecv: '', vin: '',
      novePredReg: null, maEcv: null,
      typ: 'osobne', vyuzitie: 'osobne',
      datumReg: '', znacka: '', model: '',
      objem: '', vykon: '', hmotnost: '',
      palivo: 'benzin',
      garazovane: null, zmluvnyServis: null,
      x4: false, automat: false, parkovaci: false,
      najazd: '',
    };
    state.lookupDone = false;
    state.poistnik = {
      typ: 'fo', cudzinec: false,
      rodneCislo: '', datumNar: '', meno: '', priezvisko: '',
      ico: '', obec: '', psc: '',
    };
    render();
  }

  document.getElementById('btnResetVehicle')?.addEventListener('click', resetVehicle);
  document.getElementById('btnResetAll')?.addEventListener('click', resetAll);

  // Otvoriť automaticky ak už sú hodnoty (napr. po re-renderi)
  if (state.vehicle.ecv || state.vehicle.vin) {
    vehicleDetails.classList.add('open');
    btnReset?.classList.add('visible');
  }

  document.getElementById('fEcv')?.addEventListener('input', function() {
    this.value = this.value.toUpperCase();
    state.vehicle.ecv = this.value.trim();
    if (this.value.trim().length >= 7) triggerLookup(this.value.trim(), '');
  });

  document.getElementById('fVin')?.addEventListener('input', function() {
    this.value = this.value.toUpperCase();
    state.vehicle.vin = this.value.trim();
    if (this.value.trim().length >= 17) triggerLookup('', this.value.trim());
  });

  // Manuálne vyhľadanie / retry
  const btnEcv = document.getElementById('btnEcvLookup');
  if (btnEcv) btnEcv.addEventListener('click', () => {
    const ecv = document.getElementById('fEcv').value.trim().toUpperCase();
    const vin = document.getElementById('fVin').value.trim().toUpperCase();
    if (!ecv && !vin) return;
    state.lookupDone = false;
    triggerLookup(ecv, vin);
  });

  // Helper — uloží aktuálne hodnoty polí poistníka do state
  function savePoistnikFields() {
    const p = state.poistnik;
    p.rodneCislo  = document.getElementById('pRodneCislo')?.value  ?? p.rodneCislo;
    p.datumNar    = document.getElementById('pDatumNar')?.value    ?? p.datumNar;
    p.meno        = document.getElementById('pMeno')?.value        ?? p.meno;
    p.priezvisko  = document.getElementById('pPriezvisko')?.value  ?? p.priezvisko;
    p.ico         = document.getElementById('pIco')?.value         ?? p.ico;
    p.obec        = document.getElementById('pObec')?.value        ?? p.obec;
    p.psc         = document.getElementById('pPsc')?.value         ?? p.psc;
  }

  // Segment control — typ poistníka
  document.querySelectorAll('[data-segment]').forEach(btn => {
    btn.addEventListener('click', () => {
      savePoistnikFields();
      state.poistnik.typ = btn.dataset.segment;
      render();
    });
  });

  // Checkbox cudzinec
  document.getElementById('pCudzinec')?.addEventListener('change', function() {
    savePoistnikFields();
    state.poistnik.cudzinec = this.checked;
    render();
  });

  // Toggles (Áno/Nie)
  document.querySelectorAll('[data-toggle]').forEach(btn => {
    btn.addEventListener('click', () => {
      const key = btn.dataset.toggle;
      const val = btn.dataset.val === 'true';
      state.vehicle[key] = val;
      render();
    });
  });

  // Checkbox pills
  document.querySelectorAll('[data-pill]').forEach(pill => {
    pill.addEventListener('click', () => {
      const key = pill.dataset.pill;
      state.vehicle[key] = !state.vehicle[key];
      render();
    });
  });

  const btnS1Next = document.getElementById('btnStep1Next');
  if (btnS1Next) btnS1Next.addEventListener('click', async () => {
    const v = state.vehicle;
    // Zbieranie hodnôt z formulára
    v.ecv      = (document.getElementById('fEcv')?.value      || '').trim().toUpperCase();
    v.vin      = (document.getElementById('fVin')?.value      || '').trim().toUpperCase();
    v.typ      = document.getElementById('fTyp')?.value      || v.typ;
    v.vyuzitie = document.getElementById('fVyuzitie')?.value  || v.vyuzitie;
    v.datumReg = document.getElementById('fDatumReg')?.value  || '';
    v.znacka   = document.getElementById('fZnacka')?.value    || '';
    v.model    = document.getElementById('fModel')?.value     || '';
    v.objem    = document.getElementById('fObjem')?.value     || '';
    v.vykon    = document.getElementById('fVykon')?.value     || '';
    v.hmotnost = document.getElementById('fHmotnost')?.value  || '';
    v.palivo   = document.getElementById('fPalivo')?.value    || v.palivo;
    v.najazd   = document.getElementById('fNajazd')?.value    || '';

    savePoistnikFields();

    if (!v.objem || !v.vykon) {
      alert('Prosím vyplňte aspoň objem a výkon motora.');
      return;
    }

    btnS1Next.disabled = true;
    btnS1Next.innerHTML = '<span class="spinner"></span> Kalkulujem...';

    const prices = await apiGetPrices(state.vehicle);
    state.apiPrices = prices;
    state.selected.add(CONFIG.hero);

    state.step = 2;
    render();
  });

  // STEP 2 — hero toggle
  const heroCard = document.getElementById('heroCard');
  if (heroCard) heroCard.addEventListener('click', () => {
    const id = heroCard.dataset.id;
    state.selected.has(id) ? state.selected.delete(id) : state.selected.add(id);
    render();
  });

  // STEP 2 — addon toggles
  document.querySelectorAll('.addon-card').forEach(card => {
    card.addEventListener('click', () => {
      const id = card.dataset.id;
      state.selected.has(id) ? state.selected.delete(id) : state.selected.add(id);
      render();
    });
  });

  const btnS2Back = document.getElementById('btnStep2Back');
  if (btnS2Back) btnS2Back.addEventListener('click', () => { state.step = 1; render(); });

  const btnS2Next = document.getElementById('btnStep2Next');
  if (btnS2Next) btnS2Next.addEventListener('click', () => {
    if (state.selected.size === 0) return;
    state.step = 3;
    render();
  });

  // STEP 3
  const btnS3Back = document.getElementById('btnStep3Back');
  if (btnS3Back) btnS3Back.addEventListener('click', () => { state.step = 2; render(); });

  const btnS3Next = document.getElementById('btnStep3Next');
  if (btnS3Next) btnS3Next.addEventListener('click', () => {
    const meno = document.getElementById('fMeno').value.trim();
    const priezvisko = document.getElementById('fPriezvisko').value.trim();
    const email = document.getElementById('fEmail').value.trim();
    if (!meno || !priezvisko || !email) {
      alert('Prosím vyplňte aspoň meno, priezvisko a e-mail.');
      return;
    }
    state.client = {
      meno, priezvisko,
      dnar:     document.getElementById('fDnar').value,
      rc:       document.getElementById('fRc').value,
      adresa:   document.getElementById('fAdresa').value,
      email,
      tel:      document.getElementById('fTel').value,
      vin:      document.getElementById('fVin').value,
      znacka:   document.getElementById('fZnacka').value,
      model:    document.getElementById('fModel').value,
      farba:    document.getElementById('fFarba').value,
      sedadla:  document.getElementById('fSedadla').value,
      nosnost:  document.getElementById('fNosnost').value,
    };
    state.step = 4;
    render();
  });

  // STEP 4
  const btnS4Back = document.getElementById('btnStep4Back');
  if (btnS4Back) btnS4Back.addEventListener('click', () => { state.step = 3; render(); });

  const btnS4Submit = document.getElementById('btnStep4Submit');
  if (btnS4Submit) btnS4Submit.addEventListener('click', async () => {
    state.submitting = true;
    render();
    const payload = {
      vehicle: state.vehicle,
      client: state.client,
      products: Array.from(state.selected),
      prices: state.apiPrices,
    };
    const result = await apiSubmit(payload);
    state.submitting = false;
    if (result.success) {
      renderSuccess(result.zmluvaId);
    } else {
      alert('Chyba pri odosielaní. Skúste znova.');
      render();
    }
  });
}

   INIT
════════════════════════════════════════════════════════ */
render();
</script>
