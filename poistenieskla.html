<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>poistenieskla</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  /* ─── CONFIG-DRIVEN ACCENT ─────────────────────────────── */
  :root {
    --accent:        #2563EB;
    --accent-light:  #EFF6FF;
    --accent-mid:    #BFDBFE;
    --hero-bg:       #0F172A;
    --hero-text:     #F8FAFC;
    --surface:       #FFFFFF;
    --surface-2:     #F8FAFC;
    --border:        #E2E8F0;
    --text:          #0F172A;
    --text-muted:    #64748B;
    --danger:        #EF4444;
    --success:       #10B981;
    --radius:        14px;
    --radius-sm:     8px;
    --shadow:        0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
    --shadow-lg:     0 8px 32px rgba(0,0,0,.12);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--surface-2);
    color: var(--text);
    min-height: 100vh;
  }

  /* ─── HEADER ──────────────────────────────────────────── */
  header {
    background: var(--hero-bg);
    padding: 0 24px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    font-family: 'Instrument Serif', serif;
    font-size: 22px;
    color: #fff;
    letter-spacing: -.3px;
  }
  .logo span { color: var(--accent); }

  /* ─── STEPPER ─────────────────────────────────────────── */
  .stepper {
    background: var(--hero-bg);
    padding: 0 24px 20px;
    display: flex;
    gap: 0;
    max-width: 680px;
    margin: 0 auto;
  }
  .step {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    position: relative;
  }
  .step::before {
    content: '';
    position: absolute;
    top: 14px;
    left: 50%;
    width: 100%;
    height: 2px;
    background: rgba(255,255,255,.15);
  }
  .step:last-child::before { display: none; }
  .step-circle {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: rgba(255,255,255,.12);
    border: 2px solid rgba(255,255,255,.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 600;
    color: rgba(255,255,255,.5);
    position: relative;
    z-index: 1;
    transition: all .3s;
  }
  .step.active .step-circle {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    box-shadow: 0 0 0 4px rgba(37,99,235,.3);
  }
  .step.done .step-circle {
    background: var(--success);
    border-color: var(--success);
    color: #fff;
  }
  .step.done::before { background: var(--success); }
  .step.active::before { background: rgba(255,255,255,.15); }
  .step-label {
    font-size: 10px;
    font-weight: 500;
    color: rgba(255,255,255,.35);
    text-align: center;
    letter-spacing: .3px;
    text-transform: uppercase;
  }
  .step.active .step-label { color: rgba(255,255,255,.9); }
  .step.done .step-label { color: rgba(255,255,255,.6); }

  /* ─── MAIN LAYOUT ─────────────────────────────────────── */
  main {
    max-width: 760px;
    margin: 32px auto;
    padding: 0 16px 80px;
  }

  /* ─── CARDS ───────────────────────────────────────────── */
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    padding: 32px;
    margin-bottom: 20px;
  }
  .card-title {
    font-family: 'Instrument Serif', serif;
    font-size: 26px;
    color: var(--text);
    margin-bottom: 6px;
  }
  .card-sub {
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 28px;
    line-height: 1.5;
  }

  /* ─── FORM ────────────────────────────────────────────── */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  .form-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
  .form-grid.cols-1 { grid-template-columns: 1fr; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field.span2 { grid-column: span 2; }
  .field.span3 { grid-column: span 3; }
  label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  input, select {
    height: 44px;
    padding: 0 14px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--text);
    background: var(--surface);
    transition: border-color .2s, box-shadow .2s;
    outline: none;
    width: 100%;
  }
  input:focus, select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(37,99,235,.1);
  }
  input.error { border-color: var(--danger); }
  input.readonly {
    background: var(--surface-2);
    color: var(--text-muted);
    border-color: transparent;
    cursor: default;
  }
  input.readonly:focus { border-color: transparent; box-shadow: none; }

  /* ─── STEP 1 SPECIAL ──────────────────────────────────── */


  .vehicle-info {
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 16px;
    font-size: 14px;
    font-weight: 500;
    display: none;
  }
  .vehicle-info.visible { display: flex; }
  .vehicle-info.found {
    background: var(--accent-light);
    border: 1.5px solid var(--accent-mid);
    color: var(--accent);
  }
  .vehicle-info.not-found {
    background: #fffbeb;
    border: 1.5px solid #fde68a;
    color: #92400e;
  }
  .vehicle-info.loading {
    background: var(--surface-2);
    border: 1.5px solid var(--border);
    color: var(--text-muted);
  }
  .vehicle-info svg { flex-shrink: 0; }

  /* ─── STEP 2 — HERO INSURANCE ─────────────────────────── */
  .hero-insurance {
    background: linear-gradient(135deg, var(--hero-bg) 0%, #1e3a8a 100%);
    border-radius: var(--radius);
    padding: 28px;
    color: #fff;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: transform .2s;
    margin-bottom: 20px;
    border: 2px solid transparent;
  }
  .hero-insurance::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 160px; height: 160px;
    background: rgba(37,99,235,.25);
    border-radius: 50%;
  }
  .hero-insurance::after {
    content: '';
    position: absolute;
    bottom: -60px; left: 30%;
    width: 220px; height: 220px;
    background: rgba(255,255,255,.03);
    border-radius: 50%;
  }
  .hero-insurance.selected {
    border-color: #60a5fa;
    box-shadow: 0 0 0 3px rgba(96,165,250,.2), var(--shadow-lg);
  }
  .hero-insurance:hover { transform: translateY(-2px); }
  .hero-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,.12);
    border: 1px solid rgba(255,255,255,.2);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .6px;
    margin-bottom: 12px;
    color: #93c5fd;
  }
  .hero-name {
    font-family: 'Instrument Serif', serif;
    font-size: 32px;
    margin-bottom: 8px;
    position: relative;
    z-index: 1;
  }
  .hero-desc {
    font-size: 14px;
    color: rgba(255,255,255,.7);
    line-height: 1.6;
    max-width: 480px;
    margin-bottom: 20px;
    position: relative;
    z-index: 1;
  }
  .hero-price-row {
    display: flex;
    align-items: flex-end;
    gap: 16px;
    position: relative;
    z-index: 1;
  }
  .hero-price {
    font-size: 36px;
    font-weight: 300;
    letter-spacing: -1px;
  }
  .hero-price strong { font-weight: 700; }
  .hero-price-period {
    font-size: 13px;
    color: rgba(255,255,255,.5);
    margin-bottom: 6px;
  }
  .hero-check {
    margin-left: auto;
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,.3);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .2s;
    background: rgba(255,255,255,.08);
  }
  .hero-insurance.selected .hero-check {
    background: var(--success);
    border-color: var(--success);
  }
  .hero-features {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 16px;
    position: relative;
    z-index: 1;
  }
  .hero-feature {
    background: rgba(255,255,255,.1);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 12px;
    color: rgba(255,255,255,.8);
  }

  /* ─── ADD-ONS GRID ────────────────────────────────────── */
  .addons-title {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .6px;
    color: var(--text-muted);
    margin-bottom: 12px;
  }
  .addons-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  @media (max-width: 600px) {
    .addons-grid { grid-template-columns: repeat(2, 1fr); }
    .form-grid, .form-grid.cols-3 { grid-template-columns: 1fr; }
    .field.span2, .field.span3 { grid-column: span 1; }
  }
  .addon-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px;
    cursor: pointer;
    transition: all .2s;
    position: relative;
    overflow: hidden;
  }
  .addon-card:hover {
    border-color: var(--accent-mid);
    background: var(--accent-light);
    transform: translateY(-1px);
  }
  .addon-card.selected {
    border-color: var(--accent);
    background: var(--accent-light);
    box-shadow: 0 0 0 2px rgba(37,99,235,.1);
  }
  .addon-card.loading {
    opacity: .5;
    pointer-events: none;
  }
  .addon-icon { font-size: 20px; margin-bottom: 6px; display: block; }
  .addon-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
    line-height: 1.3;
  }
  .addon-price {
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
  }
  .addon-check {
    position: absolute;
    top: 8px; right: 8px;
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .2s;
  }
  .addon-card.selected .addon-check {
    background: var(--accent);
    border-color: var(--accent);
  }
  .addon-card.selected .addon-check::after {
    content: '';
    width: 6px; height: 4px;
    border-left: 2px solid #fff;
    border-bottom: 2px solid #fff;
    transform: rotate(-45deg) translateY(-1px);
    display: block;
  }

  /* ─── PRICE SUMMARY BAR ───────────────────────────────── */
  .price-bar {
    position: sticky;
    bottom: 0;
    background: var(--hero-bg);
    border-top: 1px solid rgba(255,255,255,.1);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 100;
  }
  .price-bar-label {
    font-size: 12px;
    color: rgba(255,255,255,.5);
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  .price-bar-total {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -.5px;
  }
  .price-bar-total span {
    font-size: 13px;
    font-weight: 400;
    color: rgba(255,255,255,.5);
    margin-left: 4px;
  }
  .price-bar-count {
    font-size: 12px;
    color: rgba(255,255,255,.4);
  }

  /* ─── BUTTONS ─────────────────────────────────────────── */
  .btn-primary {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    padding: 0 28px;
    height: 48px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background .2s, transform .1s, box-shadow .2s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
  }
  .btn-primary:hover { background: #1d4ed8; box-shadow: 0 4px 16px rgba(37,99,235,.35); }
  .btn-primary:active { transform: scale(.97); }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; box-shadow: none; }
  .btn-secondary {
    background: transparent;
    color: var(--text-muted);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0 20px;
    height: 48px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all .2s;
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-row {
    display: flex;
    gap: 12px;
    justify-content: flex-end;
    margin-top: 28px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }

  /* ─── SUMMARY ─────────────────────────────────────────── */
  .summary-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
  }
  .summary-item:last-child { border-bottom: none; }
  .summary-item-name { font-size: 15px; font-weight: 500; }
  .summary-item-name small {
    display: block;
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 400;
    margin-top: 2px;
  }
  .summary-item-price {
    font-size: 16px;
    font-weight: 700;
    color: var(--accent);
    white-space: nowrap;
  }
  .summary-total {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--accent-light);
    border: 1.5px solid var(--accent-mid);
    border-radius: var(--radius-sm);
    padding: 16px 20px;
    margin-top: 16px;
  }
  .summary-total-label {
    font-size: 14px;
    font-weight: 600;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: .4px;
  }
  .summary-total-price {
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -1px;
  }
  .summary-total-price span {
    font-size: 14px;
    font-weight: 400;
    color: var(--text-muted);
    margin-left: 4px;
  }

  /* ─── INFO BOX ────────────────────────────────────────── */
  .info-box {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 16px;
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
  }
  .info-box-icon { font-size: 20px; flex-shrink: 0; }
  .info-box p { font-size: 13px; color: var(--text-muted); line-height: 1.5; }
  .info-box p strong { color: var(--text); }

  /* ─── SUCCESS ─────────────────────────────────────────── */
  .success-screen {
    text-align: center;
    padding: 48px 24px;
  }
  .success-icon {
    width: 72px; height: 72px;
    background: #dcfce7;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    font-size: 32px;
  }
  .success-title {
    font-family: 'Instrument Serif', serif;
    font-size: 30px;
    margin-bottom: 8px;
  }
  .success-sub {
    color: var(--text-muted);
    font-size: 15px;
    line-height: 1.6;
  }

  /* ─── SPINNER ─────────────────────────────────────────── */
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid rgba(255,255,255,.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ─── SECTION HEADER ──────────────────────────────────── */
  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }
  .section-badge {
    background: var(--accent);
    color: #fff;
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .5px;
  }

  /* ─── DIVIDER ─────────────────────────────────────────── */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 24px 0;
  }
  .section-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .6px;
    color: var(--text-muted);
    margin-bottom: 16px;
  }

  /* ─── TOGGLE (Áno / Nie) ──────────────────────────────── */
  .toggle-group {
    display: flex;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
    height: 44px;
  }
  .toggle-group button {
    flex: 1;
    border: none;
    background: var(--surface);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    transition: background .15s, color .15s;
  }
  .toggle-group button:first-child {
    border-right: 1.5px solid var(--border);
  }
  .toggle-group button.active-yes {
    background: #dcfce7;
    color: #15803d;
    font-weight: 600;
  }
  .toggle-group button.active-no {
    background: #fee2e2;
    color: #b91c1c;
    font-weight: 600;
  }

  /* ─── CHECKBOXES ──────────────────────────────────────── */
  .checkbox-group {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .checkbox-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 14px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-muted);
    background: var(--surface);
    transition: all .15s;
    user-select: none;
  }
  .checkbox-pill input { display: none; }
  .checkbox-pill.checked {
    border-color: var(--accent);
    background: var(--accent-light);
    color: var(--accent);
  }
  .checkbox-pill .pill-check {
    width: 16px; height: 16px;
    border-radius: 4px;
    border: 2px solid var(--border);
    background: #fff;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all .15s;
  }
  .checkbox-pill.checked .pill-check {
    background: var(--accent);
    border-color: var(--accent);
  }
  .checkbox-pill.checked .pill-check::after {
    content: '';
    width: 5px; height: 3px;
    border-left: 2px solid #fff;
    border-bottom: 2px solid #fff;
    transform: rotate(-45deg) translateY(-1px);
    display: block;
  }

  /* ─── VEHICLE DETAIL ROW ──────────────────────────────── */
  .vehicle-detail-row {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .vehicle-detail-item {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    flex: 1;
    min-width: 100px;
  }
  .vehicle-detail-item label {
    display: block;
    margin-bottom: 3px;
    font-size: 10px;
  }
  .vehicle-detail-item span {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }

  /* ─── MODAL ───────────────────────────────────────────── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(15,23,42,.5);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 500;
    animation: fadeIn .2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow-lg);
    padding: 32px;
    width: 100%;
    max-width: 460px;
    margin: 16px;
    animation: slideUp .25s ease;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .modal-title {
    font-family: 'Instrument Serif', serif;
    font-size: 22px;
    margin-bottom: 6px;
  }
  .modal-sub {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 20px;
  }
  .modal-vehicle-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 24px;
  }
  .modal-vehicle-item {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
  }
  .modal-vehicle-item label {
    display: block;
    font-size: 10px;

    </div>`;
}

function datumNarFromRC(rc) {
  const clean = rc.replace(/\D/g, '');
  if (clean.length < 6) return '';
  let rr = parseInt(clean.slice(0, 2));
  let mm = parseInt(clean.slice(2, 4));
  let dd = parseInt(clean.slice(4, 6));
  if (mm > 50) mm -= 50;          // žena
  if (mm > 20) mm -= 20;          // výnimočný prípad
  const year = rr + (rr >= 0 && rr <= 24 ? 2000 : 1900);
  const m = String(mm).padStart(2, '0');
  const d = String(dd).padStart(2, '0');
  return `${year}-${m}-${d}`;     // ISO formát pre input[type=date]
}

function pillHtml(id, label, checked) {
  return `

      ${label}

/* ════════════════════════════════════════════════════════
   EVENT LISTENERS
════════════════════════════════════════════════════════ */
function attachListeners() {
  if (state.step === 1) {
  // STEP 1 — Expand + Lookup + Modal
  const vehicleDetails = document.getElementById('vehicleDetails');
  const vehicleInfo    = document.getElementById('vehicleInfo');
  const btnReset       = document.getElementById('btnResetVehicle');

  function showVehicleInfo(type, text) {
    const icons = { loading: '⏳', found: '✅', 'not-found': '⚠️' };
    state.vehicleStatus = type;
    state.vehicleInfoText = text;
    vehicleInfo.className = `vehicle-info visible ${type}`;
    document.getElementById('vehicleInfoText').textContent = `${icons[type]} ${text}`;
  }

  function fillVehicleFields(d) {
    // Uložiť do state
    if (d.znacka)            state.vehicle.znacka   = d.znacka;
    if (d.model)             state.vehicle.model    = d.model;
    if (d.datumReg)          state.vehicle.datumReg = d.datumReg;
    if (d.typ)               state.vehicle.typ      = d.typ;
    if (d.palivo)            state.vehicle.palivo   = d.palivo;
    if (d.vykon)             state.vehicle.vykon    = d.vykon;
    if (d.objem)             state.vehicle.objem    = d.objem;
    if (d.hmotnost)          state.vehicle.hmotnost = d.hmotnost;
    if (d.vin)               state.vehicle.vin      = d.vin;
    if (d.farba !== undefined) state.vehicle.farba  = d.farba; // uložiť, zobraziť na strane 3
    if (d.tp)                  state.vehicle.tp     = d.tp;
    state.vehicle.x4 = (d.pohon === true);
    if (state.vehicle.ecv) {
      state.vehicle.maEcv     = true;
      state.vehicle.novePredReg = false;
    }

    // Preplniť DOM polia
    if (d.znacka)   document.getElementById('fZnacka')?.setAttribute('value', d.znacka);
    if (d.model)    document.getElementById('fModel')?.setAttribute('value', d.model);
    if (d.datumReg) document.getElementById('fDatumReg')?.setAttribute('value', d.datumReg);
    if (d.typ)      { const el = document.getElementById('fTyp'); if (el) el.value = d.typ; }
    if (d.palivo)   { const el = document.getElementById('fPalivo'); if (el) el.value = d.palivo; }
    if (d.vykon)    document.getElementById('fVykon')?.setAttribute('value', d.vykon);
    if (d.objem)    document.getElementById('fObjem')?.setAttribute('value', d.objem);
    if (d.hmotnost) document.getElementById('fHmotnost')?.setAttribute('value', d.hmotnost);
  }

  function clearVehicleFields() {
    ['fZnacka','fModel','fDatumReg','fVykon','fObjem','fHmotnost'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = '';
    });
    const fTyp = document.getElementById('fTyp');
    if (fTyp) fTyp.value = 'osobne';
    const fPalivo = document.getElementById('fPalivo');
    if (fPalivo) fPalivo.value = 'benzin';
  }

  function showModal(data) {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.id = 'vehicleModal';

    const formatDate = d => {
      if (!d) return '–';
      const [y, m, day] = d.split('-');
      return `${day}.${m}.${y}`;
    };
    const items = [
      { label: 'Značka',                val: data.znacka },
      { label: 'Model',                 val: data.model },
      { label: 'Typ',                   val: data.typ },
      { label: 'Dátum 1. registrácie',  val: formatDate(data.datumReg) },
      { label: 'Objem motora',          val: data.objem ? data.objem + ' cm³' : '–' },
      { label: 'Výkon motora',          val: data.vykon ? data.vykon + ' kW' : '–' },
      { label: 'Maximálna hmotnosť',    val: data.hmotnost ? data.hmotnost + ' kg' : '–' },
      { label: 'Palivo',                val: data.palivo },
      { label: 'Farba',                 val: data.farba },
      { label: 'Pohon 4x4',            val: data.pohon === true ? 'Áno' : data.pohon === false ? 'Nie' : '–' },
    ].map(i => `
      <div class="modal-vehicle-item">
        <label>${i.label}</label>
        <span>${i.val || '–'}</span>
      </div>`).join('');

    const vinRow = data.vin ? `
      <div style="background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:12px;">
        <label style="display:block;font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;">VIN</label>
        <span style="font-size:15px;font-weight:600;color:var(--text);font-family:monospace;letter-spacing:1px;">${data.vin}</span>
      </div>` : '';

    overlay.innerHTML = `
      <div class="modal">
        <div class="modal-title">Je to vaše vozidlo?</div>
        <div class="modal-sub">Skontrolujte údaje. Ak niečo nesedí, môžete ich po potvrdení upraviť.</div>
        ${vinRow}
        <div class="modal-vehicle-grid">${items}</div>
        <div class="modal-btn-row">
          <button class="btn-secondary" id="modalBtnOther">Vypísať iné</button>
          <button class="btn-primary"   id="modalBtnConfirm">✓ Potvrdiť</button>
        </div>
      </div>`;

    document.body.appendChild(overlay);

    document.getElementById('modalBtnConfirm').addEventListener('click', () => {
      fillVehicleFields(data);
      state.vehicleStatus = 'found';
      state.vehicleInfoText = `${data.znacka} ${data.model} (${data.datumReg?.slice(0,4)}) · ${data.vykon} kW · ${data.objem} cm³`;
      overlay.remove();
      render();
    });

    document.getElementById('modalBtnOther').addEventListener('click', () => {
      vehicleDetails.classList.add('open');
      clearVehicleFields();
      showVehicleInfo('not-found', 'Vyplňte údaje vozidla ručne.');
      btnReset.classList.add('visible');
      overlay.remove();
    });
  }

  async function triggerLookup(ecv, vin) {
    if (state.lookupDone) return;
    state.lookupDone = true;
    showVehicleInfo('loading', 'Vyhľadávam vozidlo...');

    const result = await apiLookupVehicle({ ecv, vin });

    if (result.found) {
      showModal(result.data);
    } else {
      showNewVehicleModal();
    }
  }

  function showNewVehicleModal() {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal">
        <div class="modal-title">Nové vozidlo pred prvou registráciou?</div>
        <div class="modal-btn-row" style="margin-top:24px;">
          <button class="btn-secondary" id="modalNewVehicleNie">Nie</button>
          <button class="btn-secondary" id="modalNewVehicleAno">Áno</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);

    const today = new Date().toISOString().slice(0, 10);

    document.getElementById('modalNewVehicleAno').addEventListener('click', () => {
      state.vehicle.novePredReg = true;
      state.vehicle.datumReg = today;
      state.vehicleStatus = 'not-found';
      state.vehicleInfoText = 'Vozidlo sa nenašlo v databáze. Vyplňte údaje ručne.';
      overlay.remove();
      render();
    });

    document.getElementById('modalNewVehicleNie').addEventListener('click', () => {
      state.vehicle.novePredReg = false;
      state.vehicleStatus = 'not-found';
      state.vehicleInfoText = 'Vozidlo sa nenašlo v databáze. Vyplňte údaje ručne.';
      overlay.remove();
      render();
    });
  }

  // Reset vozidla
  function syncPoistnikFromDOM() {
    const p = state.poistnik;
    p.rodneCislo  = document.getElementById('pRodneCislo')?.value  ?? p.rodneCislo;
    p.datumNar    = document.getElementById('pDatumNar')?.value    ?? p.datumNar;
    p.meno        = document.getElementById('pMeno')?.value        ?? p.meno;
    p.priezvisko  = document.getElementById('pPriezvisko')?.value  ?? p.priezvisko;
    p.ico         = document.getElementById('pIco')?.value         ?? p.ico;
    p.obec        = document.getElementById('pObec')?.value        ?? p.obec;
    p.psc         = document.getElementById('pPsc')?.value         ?? p.psc;
  }

  function resetVehicle() {
    syncPoistnikFromDOM();
    state.vehicle.ecv = '';
    state.vehicle.vin = '';
    state.lookupDone = false;
    state.vehicleStatus = null;
    state.vehicleInfoText = '';
    state.vehicle.novePredReg = null;
    state.vehicle.maEcv = null;
    state.vehicle.garazovane = null;
    state.vehicle.zmluvnyServis = null;
    state.vehicle.x4 = false;
    state.vehicle.automat = false;
    state.vehicle.parkovaci = false;
    state.vehicle.znacka = '';
    state.vehicle.model = '';
    state.vehicle.datumReg = '';
    state.vehicle.palivo = 'benzin';
    state.vehicle.vykon = '';
    state.vehicle.objem = '';
    state.vehicle.hmotnost = '';
    render();
  }

  function resetAll() {
    state.vehicle = {
      ecv: '', vin: '',
      novePredReg: null, maEcv: null,
      typ: 'osobne', vyuzitie: 'osobne',
      datumReg: '', znacka: '', model: '',
      objem: '', vykon: '', hmotnost: '',
      palivo: 'benzin',
      garazovane: false, zmluvnyServis: false,
      x4: false, automat: false, parkovaci: false,
      farba: '',
      tp: '', bezTp: false,
      najazd: '25000',
    };
    state.lookupDone = false;
    state.vehicleStatus = null;
    state.vehicleInfoText = '';
    state.apiPrices = {};
    state.selected = new Set();
    state.poistnik = {
      typ: 'fo', cudzinec: false,
      rodneCislo: '', datumNar: '', meno: '', priezvisko: '',
      ico: '', nazov: '', obec: '', psc: '',
      dokladCislo: '', email: '', tel: '',
      ulica: '', cislo: '',
      titulPred: '', titulZa: '',
    };
    render();
  }

  document.getElementById('btnResetVehicle')?.addEventListener('click', resetVehicle);
  document.getElementById('btnResetAll')?.addEventListener('click', resetAll);

  // Obnoviť stav po re-renderi zo state
  if (state.vehicle.ecv || state.vehicle.vin) {
    vehicleDetails.classList.add('open');
    btnReset?.classList.add('visible');
  }
  if (state.vehicleStatus) {
    const icons = { loading: '⏳', found: '✅', 'not-found': '⚠️' };
    vehicleInfo.className = `vehicle-info visible ${state.vehicleStatus}`;
    document.getElementById('vehicleInfoText').textContent = `${icons[state.vehicleStatus]} ${state.vehicleInfoText}`;
  }

  document.getElementById('fEcv')?.addEventListener('input', function() {
    this.value = this.value.toUpperCase();
    state.vehicle.ecv = this.value.trim();
    if (this.value.trim().length >= 7) triggerLookup(this.value.trim(), '');
  });

  document.getElementById('fVin')?.addEventListener('input', function() {
    this.value = this.value.toUpperCase();
    state.vehicle.vin = this.value.trim();
    if (this.value.trim().length >= 17) triggerLookup('', this.value.trim());
  });


  // Helper — uloží aktuálne hodnoty polí poistníka do state
  function savePoistnikFields() {
    const p = state.poistnik;
    const activeSegment = document.querySelector('[data-segment].active');
    if (activeSegment) p.typ = activeSegment.dataset.segment;
    p.rodneCislo  = document.getElementById('pRodneCislo')?.value  ?? p.rodneCislo;
    p.datumNar    = document.getElementById('pDatumNar')?.value    ?? p.datumNar;
    p.meno        = document.getElementById('pMeno')?.value        ?? p.meno;
    p.priezvisko  = document.getElementById('pPriezvisko')?.value  ?? p.priezvisko;
    p.ico         = document.getElementById('pIco')?.value         ?? p.ico;
    p.obec        = document.getElementById('pObec')?.value        ?? p.obec;
    p.psc         = document.getElementById('pPsc')?.value         ?? p.psc;
  }

  // Segment control — typ poistníka
  document.querySelectorAll('[data-segment]').forEach(btn => {
    btn.addEventListener('click', () => {
      savePoistnikFields();
      state.poistnik.typ = btn.dataset.segment;
      render();
    });
  });

  // Checkbox cudzinec
  document.getElementById('pRodneCislo')?.addEventListener('input', function() {
    state.poistnik.rodneCislo = this.value;
    const vypoc = datumNarFromRC(this.value);
    if (vypoc) state.poistnik.datumNar = vypoc;
  });

  document.getElementById('pCudzinec')?.addEventListener('change', function() {
    savePoistnikFields();
    state.poistnik.cudzinec = this.checked;
    render();
  });

  // Toggles (Áno/Nie)
  document.querySelectorAll('[data-toggle]').forEach(btn => {
    btn.addEventListener('click', () => {
      const key = btn.dataset.toggle;
      const val = btn.dataset.val === 'true';
      state.vehicle[key] = val;
      render();
    });
  });

  // Checkbox pills
  document.querySelectorAll('[data-pill]').forEach(pill => {
    pill.addEventListener('click', () => {
      const key = pill.dataset.pill;
      state.vehicle[key] = !state.vehicle[key];
      render();
    });
  });

  const btnS1Next = document.getElementById('btnStep1Next');
  if (btnS1Next) btnS1Next.addEventListener('click', async () => {
    const v = state.vehicle;
    // Zbieranie hodnôt z formulára
    v.ecv      = (document.getElementById('fEcv')?.value      || '').trim().toUpperCase();
    v.vin      = (document.getElementById('fVin')?.value      || '').trim().toUpperCase();
    v.typ      = document.getElementById('fTyp')?.value      || v.typ;
    v.vyuzitie = document.getElementById('fVyuzitie')?.value  || v.vyuzitie;
    v.datumReg = document.getElementById('fDatumReg')?.value  || '';
    v.znacka   = document.getElementById('fZnacka')?.value    || '';
    v.model    = document.getElementById('fModel')?.value     || '';
    v.objem    = document.getElementById('fObjem')?.value     || '';
    v.vykon    = document.getElementById('fVykon')?.value     || '';
    v.hmotnost = document.getElementById('fHmotnost')?.value  || '';
    v.palivo   = document.getElementById('fPalivo')?.value    || v.palivo;
    v.najazd   = document.getElementById('fNajazd')?.value    || '';

    savePoistnikFields();

    if (!v.objem || !v.vykon) {
      alert('Prosím vyplňte aspoň objem a výkon motora.');
      return;
    }

    btnS1Next.disabled = true;
    btnS1Next.innerHTML = '<span class="spinner"></span> Kalkulujem...';

    const prices = await apiGetPrices(state.vehicle);
    state.apiPrices = prices;
    state.selected.add(CONFIG.hero);

    state.step = 2;
    render();
  });
  } // end step 1

  // STEP 2 — hero toggle
  const heroCard = document.getElementById('heroCard');
  if (heroCard) heroCard.addEventListener('click', () => {
    const id = heroCard.dataset.id;
    state.selected.has(id) ? state.selected.delete(id) : state.selected.add(id);
    render();
  });

  // STEP 2 — addon toggles
  document.querySelectorAll('.addon-card').forEach(card => {
    card.addEventListener('click', () => {
      const id = card.dataset.id;
      state.selected.has(id) ? state.selected.delete(id) : state.selected.add(id);
      render();
    });
  });

  const btnS2Back = document.getElementById('btnStep2Back');
  if (btnS2Back) btnS2Back.addEventListener('click', () => { state.step = 1; render(); });

  const btnS2Next = document.getElementById('btnStep2Next');
  if (btnS2Next) btnS2Next.addEventListener('click', () => {
    if (state.selected.size === 0) return;
    state.step = 3;
    render();
  });

  // STEP 3
  const btnS3Back = document.getElementById('btnStep3Back');
  if (btnS3Back) btnS3Back.addEventListener('click', () => { state.step = 2; render(); });

  // Checkbox bezTp
  document.getElementById('s3BezTp')?.addEventListener('change', function() {
    state.vehicle.bezTp = this.checked;
    if (this.checked) state.vehicle.tp = '';
    render();
  });

  // Farba dropdown
  document.getElementById('s3Farba')?.addEventListener('change', function() {
    state.vehicle.farba = this.value;
  });

  // TP input
  document.getElementById('s3Tp')?.addEventListener('input', function() {
    state.vehicle.tp = this.value;
  });

  // Začiatok poistenia
  document.getElementById('s3Zaciatok')?.addEventListener('change', function() {
    state.zaciatok = this.value;
  });

  // Email + telefón
  document.getElementById('s3Email')?.addEventListener('input', function() {
    state.poistnik.email = this.value;
  });
  document.getElementById('s3Tel')?.addEventListener('input', function() {
    state.poistnik.tel = this.value;
  });
  document.getElementById('s3DokladCislo')?.addEventListener('input', function() {
    state.poistnik.dokladCislo = this.value;
  });
  document.getElementById('s3Nazov')?.addEventListener('input', function() {
    state.poistnik.nazov = this.value;
  });
  document.getElementById('s3TitulPred')?.addEventListener('input', function() {
    state.poistnik.titulPred = this.value;
  });
  document.getElementById('s3TitulZa')?.addEventListener('input', function() {
    state.poistnik.titulZa = this.value;
  });
  document.getElementById('s3Ulica')?.addEventListener('input', function() {
    state.poistnik.ulica = this.value;
  });
  document.getElementById('s3Cislo')?.addEventListener('input', function() {
    state.poistnik.cislo = this.value;
  });

  const btnS3Next = document.getElementById('btnStep3Next');
  if (btnS3Next) btnS3Next.addEventListener('click', () => {
    state.zaciatok       = document.getElementById('s3Zaciatok')?.value || state.zaciatok;
    state.vehicle.tp     = document.getElementById('s3Tp')?.value || state.vehicle.tp;
    state.vehicle.farba  = document.getElementById('s3Farba')?.value || state.vehicle.farba;
    state.poistnik.email = document.getElementById('s3Email')?.value || state.poistnik.email;
    state.poistnik.tel   = document.getElementById('s3Tel')?.value   || state.poistnik.tel;
    state.step = 4;
    render();
  });

  // STEP 4
  const btnS4Back = document.getElementById('btnStep4Back');
  if (btnS4Back) btnS4Back.addEventListener('click', () => { state.step = 3; render(); });

  const btnS4Submit = document.getElementById('btnStep4Submit');
  if (btnS4Submit) btnS4Submit.addEventListener('click', async () => {
    state.submitting = true;
    render();
    const payload = {
      vehicle: state.vehicle,
      client: state.client,
      products: Array.from(state.selected),
      prices: state.apiPrices,
    };
    const result = await apiSubmit(payload);
    state.submitting = false;
    if (result.success) {
      renderSuccess(result.zmluvaId);
    } else {
      alert('Chyba pri odosielaní. Skúste znova.');
      render();
    }
  });
}

/* ════════════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════════════ */
render();
</script>
</body>
</html>
